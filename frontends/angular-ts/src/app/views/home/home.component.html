<div class="page">
  <div class="container">
    <div class="hero">
      <img src="/favicon.svg" alt="时间胶囊" class="hero-logo" />
      <h1 class="hero-title">时间胶囊</h1>
      <p class="hero-subtitle">封存此刻的心意，在未来的某个时刻开启</p>
      <div class="hero-actions">
        <a routerLink="/create" class="action-btn">
          <span class="action-btn-create">
            <span class="action-main">
              <span class="action-icon">✏️</span>
              <span class="action-label">创建胶囊</span>
            </span>
            <span class="action-desc">封存此刻的心意</span>
          </span>
        </a>
        <a routerLink="/open" class="action-btn">
          <span class="action-btn-open">
            <span class="action-main">
              <span class="action-icon">🔓</span>
              <span class="action-label">开启胶囊</span>
            </span>
            <span class="action-desc">取出未来的惊喜</span>
          </span>
        </a>
      </div>
    </div>

    <div class="features">
      <div class="feature-card card">
        <div class="feature-icon">✉️</div>
        <h3>写下心意</h3>
        <p>把想对未来说的话封存在时间胶囊中</p>
      </div>
      <div class="feature-card card">
        <div class="feature-icon">⏰</div>
        <h3>设定时间</h3>
        <p>选择胶囊开启的日期，在此之前内容将被隐藏</p>
      </div>
      <div class="feature-card card">
        <div class="feature-icon">🎁</div>
        <h3>分享胶囊码</h3>
        <p>将专属胶囊码分享给想要收到惊喜的人</p>
      </div>
    </div>
  </div>
</div>
