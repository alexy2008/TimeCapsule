<div class="page">
  <div class="container container-sm">
    <div class="page-header">
      <h1>创建时间胶囊</h1>
      <p>封存你的心意，在未来开启</p>
    </div>

    @if (created()) {
      <div class="card success-card">
        <div class="success-icon">✅</div>
        <h2>胶囊创建成功！</h2>
        <p class="hint">你的胶囊码是：</p>
        <p class="capsule-code">{{ created()!.code }}</p>
        <p class="hint-small">请记住这个胶囊码，它是开启胶囊的唯一凭证</p>
        <div class="success-actions">
          <button type="button" class="btn btn-secondary" (click)="copyCode()">
            {{ copied() ? '已复制！' : '复制胶囊码' }}
          </button>
          <a [routerLink]="['/open', created()!.code]" class="btn btn-primary">查看胶囊</a>
        </div>
      </div>
    } @else {
      @if (error()) {
        <div class="error-banner">{{ error() }}</div>
      }
      <app-capsule-form [loading]="loading()" (formSubmit)="handleSubmit($event)" />
      <app-confirm-dialog
        [visible]="showConfirm()"
        title="确认创建"
        [message]="'确定要创建标题为「' + (pendingForm()?.title ?? '') + '」的时间胶囊吗？'"
        (confirm)="confirmCreate()"
        (cancel)="showConfirm.set(false)"
      />
    }
  </div>
</div>
