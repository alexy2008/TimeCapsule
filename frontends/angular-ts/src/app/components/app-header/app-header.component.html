<header class="header">
  <div class="container header-inner">
    <a routerLink="/" class="logo">
      <img src="/favicon.svg" alt="logo" class="logo-img" />
      <span class="logo-text">时间胶囊</span>
    </a>
    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link">首页</a>
      <a routerLink="/create" routerLinkActive="active" class="nav-link">创建</a>
      <a routerLink="/open" routerLinkActive="active" class="nav-link">开启</a>
      <a routerLink="/about" routerLinkActive="active" class="nav-link">关于</a>
      <app-theme-toggle />
    </nav>
  </div>
</header>
