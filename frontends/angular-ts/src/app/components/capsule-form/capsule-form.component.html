<form class="capsule-form" (ngSubmit)="handleSubmit()">
  <div class="form-group">
    <label class="input-label" for="title">标题</label>
    <input
      id="title"
      [(ngModel)]="form.title"
      name="title"
      class="input"
      [class.input-error]="errors.title"
      placeholder="给时间胶囊取个名字"
      maxlength="100"
    />
    @if (errors.title) {
      <p class="error-text">{{ errors.title }}</p>
    }
  </div>

  <div class="form-group">
    <label class="input-label" for="content">内容</label>
    <textarea
      id="content"
      [(ngModel)]="form.content"
      name="content"
      class="input"
      [class.input-error]="errors.content"
      placeholder="写下你想对未来说的话..."
      rows="5"
    ></textarea>
    @if (errors.content) {
      <p class="error-text">{{ errors.content }}</p>
    }
  </div>

  <div class="form-row">
    <div class="form-group">
      <label class="input-label" for="creator">发布者</label>
      <input
        id="creator"
        [(ngModel)]="form.creator"
        name="creator"
        class="input"
        [class.input-error]="errors.creator"
        placeholder="你的昵称"
        maxlength="30"
      />
      @if (errors.creator) {
        <p class="error-text">{{ errors.creator }}</p>
      }
    </div>

    <div class="form-group">
      <label class="input-label" for="openAt">开启时间</label>
      <input
        id="openAt"
        [(ngModel)]="form.openAt"
        name="openAt"
        type="datetime-local"
        class="input"
        [class.input-error]="errors.openAt"
        [min]="minDateTime"
      />
      @if (errors.openAt) {
        <p class="error-text">{{ errors.openAt }}</p>
      }
    </div>
  </div>

  <button type="submit" class="btn btn-primary btn-lg submit-btn" [disabled]="loading">
    {{ loading ? '创建中...' : '封存时间胶囊' }}
  </button>
</form>
