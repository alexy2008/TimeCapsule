<form class="cyber-form cyber-glass capsule-form" (ngSubmit)="handleSubmit()">
  <div class="form-group">
    <label for="capsule-title">标题</label>
    <input
      id="capsule-title"
      [(ngModel)]="form.title"
      name="title"
      class="cyber-input"
      [class.error]="errors.title"
      placeholder="给时间胶囊取个名字"
      maxlength="100"
    />
    @if (errors.title) {
      <p class="input-error-text form-error">{{ errors.title }}</p>
    }
  </div>

  <div class="form-group">
    <label for="capsule-content">内容</label>
    <textarea
      id="capsule-content"
      [(ngModel)]="form.content"
      name="content"
      class="cyber-input textarea"
      [class.error]="errors.content"
      placeholder="写下你想对未来说的话..."
      rows="6"
    ></textarea>
    @if (errors.content) {
      <p class="input-error-text form-error">{{ errors.content }}</p>
    }
  </div>

  <div class="meta-row">
    <div class="form-group">
      <label for="capsule-creator">发布者</label>
      <input
        id="capsule-creator"
        [(ngModel)]="form.creator"
        name="creator"
        class="cyber-input"
        [class.error]="errors.creator"
        placeholder="你的昵称"
        maxlength="30"
      />
      @if (errors.creator) {
        <p class="input-error-text form-error">{{ errors.creator }}</p>
      }
    </div>

    <div class="form-group">
      <label for="capsule-open-at">开启时间</label>
      <input
        id="capsule-open-at"
        [(ngModel)]="form.openAt"
        name="openAt"
        type="datetime-local"
        class="cyber-input"
        [class.error]="errors.openAt"
        [min]="minDateTime"
      />
      @if (errors.openAt) {
        <p class="input-error-text form-error">{{ errors.openAt }}</p>
      }
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary btn-glow" [disabled]="loading">
      <span class="btn-text">{{ loading ? '创建中...' : '封存胶囊' }}</span>
      <div class="btn-scanner"></div>
    </button>
  </div>
</form>
